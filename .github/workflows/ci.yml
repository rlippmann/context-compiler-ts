name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PY_FIXTURE_REF: 6cedcd955fcf4b4e687ea85771ebbc5302e5fe01
      PY_FIXTURE_CHECKOUT: /tmp/context-compiler-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Checkout Python fixture source
        # Pin to an explicit Python commit SHA for deterministic fixture drift checks.
        run: |
          echo "Python fixture ref: ${PY_FIXTURE_REF}"
          echo "Python checkout path: ${PY_FIXTURE_CHECKOUT}"
          git init "${PY_FIXTURE_CHECKOUT}"
          git -C "${PY_FIXTURE_CHECKOUT}" remote add origin https://github.com/rlippmann/context-compiler
          git -C "${PY_FIXTURE_CHECKOUT}" fetch --depth 1 origin "${PY_FIXTURE_REF}"
          git -C "${PY_FIXTURE_CHECKOUT}" checkout --detach FETCH_HEAD
          echo "Resolved fixture source: ${PY_FIXTURE_CHECKOUT}/tests/fixtures/conformance"

      - name: Check conformance fixture drift
        env:
          FIXTURES_SOURCE: /tmp/context-compiler-source/tests/fixtures/conformance
        run: |
          echo "Using FIXTURES_SOURCE=${FIXTURES_SOURCE}"
          npm run fixtures:check

      - name: Check preprocessor fixture drift
        env:
          PREPROCESSOR_FIXTURES_SOURCE: /tmp/context-compiler-source/tests/fixtures/preprocessor
        run: |
          echo "Using PREPROCESSOR_FIXTURES_SOURCE=${PREPROCESSOR_FIXTURES_SOURCE}"
          npm run fixtures:preprocessor:check

      - name: Check structured fixture drift
        env:
          STRUCTURED_FIXTURES_SOURCE: /tmp/context-compiler-source/tests/fixtures/engine-regression/structured
        run: |
          echo "Using STRUCTURED_FIXTURES_SOURCE=${STRUCTURED_FIXTURES_SOURCE}"
          npm run fixtures:structured:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install Next.js example
        working-directory: examples/integrations/nextjs-basic
        run: npm ci

      - name: Build Next.js example
        working-directory: examples/integrations/nextjs-basic
        run: npm run build
