name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Checkout Python fixture source
        # TS 0.5.2 fixtures include cases added after Python v0.5.2; pin to v0.6.0
        # to keep fixture drift checks aligned with the current TS fixture corpus.
        run: git clone --depth 1 --branch v0.6.0 https://github.com/rlippmann/context-compiler ../context-compiler

      - name: Check fixture drift
        run: npm run fixtures:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install Next.js example
        working-directory: examples/nextjs-basic
        run: npm ci

      - name: Build Next.js example
        working-directory: examples/nextjs-basic
        run: npm run build
